problem_statement:
  title: "Fragmented spreadsheets block integrated event and workforce administration"
  title_citation_refs: ["cite_madhus_zoho"]
  description: "Madhu's runs a complex hospitality and events operation that includes venue coordination, quotes, contracts, payment schedules, and workforce administration. The case study says employee data was still managed on spreadsheets and that the business needed software capable of taking the company to the next level across events and staff operations."
  description_citation_refs: ["cite_madhus_zoho"]
  proposed_tags:
    - "hospitality operations"
    - "event management"
    - "workforce administration"
    - "workflow automation"
  requirements:
    - text: "Replaces spreadsheets for shift scheduling, leave tracking, and employee onboarding."
      source_basis: "direct"
      citation_refs: ["cite_madhus_zoho"]
      note: "The source directly says employee data had been tracked on spreadsheets."
    - text: "Handles event quoting, contract generation, and payment schedule communication in a single structured workflow."
      source_basis: "direct"
      citation_refs: ["cite_madhus_zoho"]
      note: "The source directly describes quote building, contract handling, and automated payment reminders."
    - text: "Gives sales and operations teams a single shared view of venue, event, and contact data."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "Inferred from the venue directory and contact-management workflow described."
    - text: "Scales to support the combined operational complexity of hospitality, catering, and event planning."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "Inferred from the source's emphasis on unusual event complexity and the need for next-level software."
  pilot_framework:
    scope:
      text: "Pilot the integrated workflow on event quoting, contracts, payment schedules, venue coordination, and employee record administration for one operating unit."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "Scoped directly from the main operational areas described in the case study."
    suggested_kpis:
      text: "Track quote turnaround time, contract completion time, percentage of event workflows handled without spreadsheets, employee administration time saved, and payment reminder completion rates."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "KPIs are inferred from the documented workflow bottlenecks and automations."
    success_criteria:
      text: "The pilot succeeds if events can be quoted and documented more consistently, employee administration moves out of spreadsheets, and teams can manage venue and payment workflows from a shared system."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "Success criteria reflect the operational pain points and use cases directly described in the source."
    common_pitfalls:
      text: "Common pitfalls include leaving exceptions outside the workflow, failing to model venue-specific pricing rules, and retaining spreadsheet-based HR side processes."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "These are implementation risks inferred from the complexity described in the source."
    duration:
      text: "A 6- to 10-week pilot is appropriate for one end-to-end event workflow plus employee administration setup."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "The source supports the workflow need but not a formal pilot timeline."
    resource_commitment:
      text: "Requires an operations owner, event-sales staff, HR or people admin support, and light implementation help to map pricing logic, documents, and employee records."
      source_basis: "inference"
      citation_refs: ["cite_madhus_zoho"]
      note: "Resource commitment is inferred from the cross-functional nature of the documented workflow."

