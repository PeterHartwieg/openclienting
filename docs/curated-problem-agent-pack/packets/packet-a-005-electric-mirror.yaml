problem_statement:
  title: "Legacy Salesforce creates friction across CRM and daily operations"
  title_citation_refs: ["cite_electric_zoho"]
  description: "Electric Mirror was using Salesforce but needed a system that was easier to implement, easier for staff to learn, and better aligned to day-to-day operational efficiency. The case study says the manufacturer wanted a quick implementation with minimal training and viewed its previous setup as a poor fit for how the business needed to run."
  description_citation_refs: ["cite_electric_zoho"]
  proposed_tags:
    - "manufacturing"
    - "crm modernization"
    - "sales operations"
    - "operational efficiency"
  requirements:
    - text: "Reduces training time and burden for staff using customer and sales workflow tools."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "Inferred from the source describing the need for minimal training and easier implementation."
    - text: "Handles lead-to-deal tracking, customer data, and quote documentation in a single workflow."
      source_basis: "direct"
      citation_refs: ["cite_electric_zoho"]
      note: "The case study directly says the deployed system is used to manage customer information, track the lead-to-deal pipeline, and document sales quotes."
    - text: "Improves operational efficiency without requiring long implementation timelines or added system complexity."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "Inferred from the documented need for a faster-to-adopt alternative to Salesforce."
    - text: "Provides an extensible platform for integrating additional business processes over time."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "Inferred from the source noting plans to expand usage across the wider Zoho ecosystem."
  pilot_framework:
    scope:
      text: "Pilot the replacement workflow across customer record management, lead-to-deal tracking, marketing campaigns, and quote documentation for a defined sales segment."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "Scoped directly from the business functions described in the case study."
    suggested_kpis:
      text: "Track user onboarding time, quote turnaround time, percentage of active opportunities updated in the system, and time spent on manual customer record administration."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "KPIs are inferred from the documented focus on efficiency, usability, and core CRM workflows."
    success_criteria:
      text: "The pilot succeeds if teams can manage core customer and sales workflows with less training friction, faster routine execution, and stronger use of shared records and quotes."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "Success criteria are inferred from the source's emphasis on implementation ease and efficiency."
    common_pitfalls:
      text: "Common pitfalls include incomplete migration of customer data, leaving quoting outside the system, and undertraining teams on the new workflow."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "These risks are inferred from the migration away from a legacy CRM environment."
    duration:
      text: "A 6-week pilot is appropriate for one sales and customer-management team using a narrower production workflow before wider rollout."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "The source supports a quick implementation, but not a formal pilot duration."
    resource_commitment:
      text: "Requires a sales operations lead, a small group of end users, and admin support for migration, workflow setup, and adoption review."
      source_basis: "inference"
      citation_refs: ["cite_electric_zoho"]
      note: "Resource commitment is inferred from the kind of CRM replacement described."

