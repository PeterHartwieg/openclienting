problem_statement:
  title: "Custom retail order management breaks down at scale"
  title_citation_refs: ["cite_budgy_monday"]
  description: "Budgy Smuggler outgrew spreadsheets as its order volume grew from tens of orders a week to hundreds and then thousands. The case study says expansion added staff, manufacturers, and locations, making it harder to manage the growing custom-design division, keep customers updated, and streamline incoming leads and website orders."
  description_citation_refs: ["cite_budgy_monday"]
  proposed_tags:
    - "retail operations"
    - "ecommerce"
    - "custom orders"
    - "order workflow"
  requirements:
    - text: "Replaces spreadsheet-based order tracking with a system that scales with growing order volume."
      source_basis: "direct"
      citation_refs: ["cite_budgy_monday"]
      note: "The source directly contrasts early spreadsheet use with later operational complexity."
    - text: "Automates or significantly reduces manual effort in keeping customers updated on order progress."
      source_basis: "direct"
      citation_refs: ["cite_budgy_monday"]
      note: "The case study explicitly says the business wanted to reduce manual customer-update work."
    - text: "Supports structured management of a growing custom-design operation."
      source_basis: "direct"
      citation_refs: ["cite_budgy_monday"]
      note: "The case study explicitly identifies this need."
    - text: "Centralizes lead and website-order management across multiple locations."
      source_basis: "direct"
      citation_refs: ["cite_budgy_monday"]
      note: "The case study explicitly identifies this need."
  pilot_framework:
    scope:
      text: "Pilot the workflow on custom-order intake, lead handling, website-order routing, and customer update processes for one region or business line."
      source_basis: "inference"
      citation_refs: ["cite_budgy_monday"]
      note: "Scoped from the exact operational pain points stated in the source."
    suggested_kpis:
      text: "Track time to process custom orders, percentage of customer updates sent automatically, lead-to-order response time, and order-routing accuracy by region."
      source_basis: "inference"
      citation_refs: ["cite_budgy_monday"]
      note: "KPIs are inferred from the source's stated workflow bottlenecks."
    success_criteria:
      text: "The pilot succeeds if the team can manage high-volume orders without spreadsheets, reduce manual customer-update work, and give staff clearer visibility into leads and orders."
      source_basis: "inference"
      citation_refs: ["cite_budgy_monday"]
      note: "Success criteria are conservative operational inferences from the documented problem."
    common_pitfalls:
      text: "Common pitfalls include keeping separate local processes by office, incomplete routing rules for orders, and failing to standardize updates for custom-design customers."
      source_basis: "inference"
      citation_refs: ["cite_budgy_monday"]
      note: "These risks are inferred from the multi-office growth and central workflow issues described."
    duration:
      text: "A 6- to 8-week pilot is appropriate for one high-volume order workflow with cross-functional staff involvement."
      source_basis: "inference"
      citation_refs: ["cite_budgy_monday"]
      note: "No explicit pilot timing is given in the source."
    resource_commitment:
      text: "Requires an operations lead, sales or ecommerce staff, and light configuration support to map workflows, routing rules, and customer communications."
      source_basis: "inference"
      citation_refs: ["cite_budgy_monday"]
      note: "Resource estimate is inferred from the source's process-management context."

