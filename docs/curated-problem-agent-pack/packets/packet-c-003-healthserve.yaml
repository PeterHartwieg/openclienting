problem_statement:
  title: "Needs structured intake and follow-up workflows for rising migrant-worker support demand"
  title_citation_refs: ["cite_healthserve_zoho"]
  description: "HealthServe expanded beyond clinic care into counselling, casework, and mental health support, then saw a major spike in incoming calls during COVID-19. The public case study says the organization needed a system that could manage every call, log each grievance, and help a small team and volunteer network follow through until support had been provided."
  description_citation_refs: ["cite_healthserve_zoho", "cite_healthserve_site"]
  proposed_tags:
    - "health services"
    - "case management"
    - "intake workflow"
    - "support operations"
  requirements:
    - text: "Log every incoming support request in a structured workflow."
      source_basis: "direct"
      citation_refs: ["cite_healthserve_zoho"]
      note: "The source directly says every call is logged as a ticket and reviewed for follow-up."
    - text: "Support follow-up by a small core team working alongside volunteers and specialists."
      source_basis: "direct"
      citation_refs: ["cite_healthserve_zoho"]
      note: "The source directly describes the staffing model and follow-up process."
    - text: "Coordinate counselling and case-management workflows so each migrant worker receives contact and a plan."
      source_basis: "direct"
      citation_refs: ["cite_healthserve_zoho"]
      note: "The source directly says the team reviews each ticket, reaches out, and charts a plan."
    - text: "Maintain service continuity as demand spikes or the service scope expands."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho", "cite_healthserve_site"]
      note: "Inferred from the call-volume surge and expansion into broader support services."
  pilot_framework:
    scope:
      text: "Pilot the workflow on counselling and case-intake requests, from first contact through assignment, follow-up, and documented support planning."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho", "cite_healthserve_site"]
      note: "Scoped from the exact intake and follow-up pattern described in the sources."
    suggested_kpis:
      text: "Track percentage of incoming requests logged, time to first follow-up, percentage of cases with a documented support plan, and open-ticket aging."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho"]
      note: "KPIs are inferred from the organization's intake and follow-through needs."
    success_criteria:
      text: "The pilot succeeds if every inbound request is captured, follow-up is more reliable, and staff can see whether a migrant worker has been contacted and supported."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho"]
      note: "Success criteria are conservative inferences from the source's emphasis on making sure each migrant worker is contacted and helped."
    common_pitfalls:
      text: "Common pitfalls include incomplete handoff between counselling and case-management teams, inconsistent volunteer documentation, and ticket backlogs during demand spikes."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho"]
      note: "Risks are inferred from the multi-step support model and surge conditions described."
    duration:
      text: "A 4- to 6-week pilot is appropriate for one intake and follow-up workflow with a small core team and repeat review cycles."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho"]
      note: "The source describes the need and operating model, not a pilot timeline."
    resource_commitment:
      text: "Requires a service lead, a small case or counselling team, and limited volunteer participation to test intake discipline, assignment rules, and follow-up review."
      source_basis: "inference"
      citation_refs: ["cite_healthserve_zoho"]
      note: "Resource estimate is inferred from the staffing model described in the source."

