problem_statement:
  title: "Siloed business tools prevent data-driven operations"
  title_citation_refs: ["cite_counter_zoho"]
  description: "Counter Culture needed better visibility across customers, distributors, suppliers, and internal processes. The public Zoho case study says the company had been relying on Salesforce plus a patchwork of software, email, and spreadsheets, and wanted a unified and data-driven system that would support more proactive operations."
  description_citation_refs: ["cite_counter_zoho"]
  proposed_tags:
    - "retail operations"
    - "data visibility"
    - "business systems"
    - "process centralization"
  requirements:
    - text: "Centralizes customer, distributor, and supplier data with real-time visibility across the team."
      source_basis: "direct"
      citation_refs: ["cite_counter_zoho"]
      note: "The source directly cites the need for a unified, data-driven solution with real-time visibility."
    - text: "Replaces fragmented tools, email threads, and spreadsheets with a unified system."
      source_basis: "direct"
      citation_refs: ["cite_counter_zoho"]
      note: "The source directly describes the prior process as a patchwork of software, email, and spreadsheets."
    - text: "Reduces time staff spend on manual coordination tasks."
      source_basis: "direct"
      citation_refs: ["cite_counter_zoho"]
      note: "The source explicitly says centralized processes let employees devote time to higher-value work."
    - text: "Enables proactive operations management as the company expands across locations."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "Inferred from the source's framing of the business becoming more proactive through process centralization."
  pilot_framework:
    scope:
      text: "Pilot the unified workflow across customer records, distributor and supplier visibility, support workflows, and core reporting for one operating segment."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "Scoped from the exact business entities and coordination needs described in the source."
    suggested_kpis:
      text: "Track time spent on manual coordination, completeness of shared customer and partner records, reporting latency, and employee time freed for higher-value work."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "KPIs are inferred from the stated goals of visibility, proactivity, and higher-value work."
    success_criteria:
      text: "The pilot succeeds if staff can work from shared records instead of disconnected tools, visibility improves across commercial relationships, and routine coordination effort declines."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "Success criteria reflect the operating improvements directly described in the source."
    common_pitfalls:
      text: "Common pitfalls include partial data migration, leaving supplier or distributor processes outside the workflow, and failing to standardize cross-functional data ownership."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "Risks are inferred from the shift away from fragmented tools."
    duration:
      text: "A 6- to 8-week pilot is appropriate for one business segment covering shared records and reporting workflows."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "The source documents the business need, not a formal pilot timeline."
    resource_commitment:
      text: "Requires an operations or commercial lead, a small cross-functional user group, and admin support for migration, reporting, and workflow standardization."
      source_basis: "inference"
      citation_refs: ["cite_counter_zoho"]
      note: "Resource estimate is inferred from the documented cross-functional nature of the problem."

