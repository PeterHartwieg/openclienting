<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <style>
    :root {
      --tile:    #dceef7;
      --teal-0:  #5aaad4;
      --teal-1:  #2773a5;
      --teal-2:  #155f90;
      --amber-0: #f0c860;
      --amber-1: #d4924a;
      --amber-2: #b06820;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --tile:    #1f3044;
        --teal-0:  #80c8e8;
        --teal-1:  #5aa0cc;
        --teal-2:  #2e78a8;
        --amber-0: #f8d878;
        --amber-1: #e0a85a;
        --amber-2: #b87030;
      }
    }
  </style>
  <defs>
    <linearGradient id="teal" x1="20" y1="8" x2="20" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="var(--teal-0)"/>
      <stop offset="50%"  stop-color="var(--teal-1)"/>
      <stop offset="100%" stop-color="var(--teal-2)"/>
    </linearGradient>
    <linearGradient id="amber" x1="28" y1="8" x2="28" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="var(--amber-0)"/>
      <stop offset="50%"  stop-color="var(--amber-1)"/>
      <stop offset="100%" stop-color="var(--amber-2)"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="46" height="46" rx="10" fill="var(--tile)"/>
  <polyline points="20,8 8,24 20,40"  fill="none" stroke="url(#teal)"  stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,8 40,24 28,40" fill="none" stroke="url(#amber)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
