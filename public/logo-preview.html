<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClienting.org &mdash; Logo Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: #f9f8f6;
      color: #1b1c2d;
      padding: 48px 40px;
      min-height: 100vh;
    }
    h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b6c7f;
      margin-bottom: 24px;
    }
    .swatch { display: flex; flex-direction: column; gap: 40px; }
    .row    { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .bg-light { background: #f9f8f6; padding: 24px 32px; border-radius: 10px; border: 1px solid #e8e6e1; }
    .bg-dark  { background: #1b1c2d; padding: 24px 32px; border-radius: 10px; }
    .label { font-size: 11px; color: #6b6c7f; min-width: 72px; }
    hr { border: none; border-top: 1px solid #e8e6e1; margin: 12px 0; }
    .icon-row { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
    .icon-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .icon-cell span { font-size: 10px; color: #6b6c7f; }
  </style>
</head>
<body>

  <!--
    Icon geometry (48x48 viewBox):
      Left bracket  (teal):  (20,8) to tip (8,24) to (20,40)  -- open ends face right
      Right bracket (amber): (28,8) to tip (40,24) to (28,40) -- open ends face left
      Gap at top/bottom: 8px between x=20 and x=28 (> stroke-width, so no cap bleed)
      Central dot at (24,24) r=2.5 -- the exchange/verified-outcome node
      Tile: flat single fill -- no shine, no gradient
  -->

  <!-- == WORDMARK - LIGHT == -->
  <h2>Wordmark &mdash; light background</h2>
  <div class="swatch">
    <div class="row">
      <div class="bg-light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 52" width="300" height="52" role="img" aria-label="OpenClienting.org">
          <defs>
            <linearGradient id="a-teal" x1="20" y1="11" x2="20" y2="41" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#5aaad4"/>
              <stop offset="50%"  stop-color="#2773a5"/>
              <stop offset="100%" stop-color="#155f90"/>
            </linearGradient>
            <linearGradient id="a-amber" x1="28" y1="11" x2="28" y2="41" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#f0c860"/>
              <stop offset="50%"  stop-color="#d4924a"/>
              <stop offset="100%" stop-color="#b06820"/>
            </linearGradient>
          </defs>

          <!-- Left bracket: teal, open ends at right, tip at left -->
          <polyline points="20,11 8,26 20,41"  fill="none" stroke="url(#a-teal)"  stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Right bracket: amber, open ends at left, tip at right -->
          <polyline points="28,11 40,26 28,41" fill="none" stroke="url(#a-amber)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Exchange node: the verified handoff point -->
          <circle cx="24" cy="26" r="2.8" fill="#2a3a4a" opacity="0.55"/>

          <!-- Wordmark -->
          <text font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="-0.03em" y="34">
            <tspan x="58" fill="#2773a5">Open</tspan><tspan fill="#1b1c2d">Clienting</tspan><tspan fill="#8a8b9e" font-size="16" font-weight="400" dy="2" dx="1">.org</tspan>
          </text>
        </svg>
      </div>
      <span class="label">Default</span>
    </div>

    <!-- == WORDMARK - DARK == -->
    <div class="row">
      <div class="bg-dark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 52" width="300" height="52" role="img" aria-label="OpenClienting.org">
          <defs>
            <linearGradient id="b-teal" x1="20" y1="11" x2="20" y2="41" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#80c8e8"/>
              <stop offset="50%"  stop-color="#5aa0cc"/>
              <stop offset="100%" stop-color="#2e78a8"/>
            </linearGradient>
            <linearGradient id="b-amber" x1="28" y1="11" x2="28" y2="41" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#f8d878"/>
              <stop offset="50%"  stop-color="#e0a85a"/>
              <stop offset="100%" stop-color="#b87030"/>
            </linearGradient>
          </defs>

          <polyline points="20,11 8,26 20,41"  fill="none" stroke="url(#b-teal)"  stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="28,11 40,26 28,41" fill="none" stroke="url(#b-amber)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="26" r="2.8" fill="#a0b8cc" opacity="0.55"/>

          <text font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="-0.03em" y="34">
            <tspan x="58" fill="#5aa0cc">Open</tspan><tspan fill="#eceae6">Clienting</tspan><tspan fill="#9a9baf" font-size="16" font-weight="400" dy="2" dx="1">.org</tspan>
          </text>
        </svg>
      </div>
      <span class="label">Dark mode</span>
    </div>
  </div>

  <br><br><hr><br>

  <!-- == ICON ONLY == -->
  <h2>Icon only &mdash; sizes &amp; backgrounds</h2>
  <div class="icon-row">

    <div class="icon-cell">
      <div class="bg-light" style="padding:16px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="64" height="64" role="img" aria-label="OpenClienting.org">
          <defs>
            <linearGradient id="c-teal" x1="20" y1="8" x2="20" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#5aaad4"/>
              <stop offset="50%"  stop-color="#2773a5"/>
              <stop offset="100%" stop-color="#155f90"/>
            </linearGradient>
            <linearGradient id="c-amber" x1="28" y1="8" x2="28" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#f0c860"/>
              <stop offset="50%"  stop-color="#d4924a"/>
              <stop offset="100%" stop-color="#b06820"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="46" height="46" rx="10" fill="#dceef7"/>
          <polyline points="20,8 8,24 20,40"  fill="none" stroke="url(#c-teal)"  stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="28,8 40,24 28,40" fill="none" stroke="url(#c-amber)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="24" r="2.8" fill="#2a3a4a" opacity="0.55"/>
        </svg>
      </div>
      <span>64 px light</span>
    </div>

    <div class="icon-cell">
      <div class="bg-dark" style="padding:16px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="64" height="64" role="img" aria-label="OpenClienting.org">
          <defs>
            <linearGradient id="d-teal" x1="20" y1="8" x2="20" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#80c8e8"/>
              <stop offset="50%"  stop-color="#5aa0cc"/>
              <stop offset="100%" stop-color="#2e78a8"/>
            </linearGradient>
            <linearGradient id="d-amber" x1="28" y1="8" x2="28" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#f8d878"/>
              <stop offset="50%"  stop-color="#e0a85a"/>
              <stop offset="100%" stop-color="#b87030"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="46" height="46" rx="10" fill="#1f3044"/>
          <polyline points="20,8 8,24 20,40"  fill="none" stroke="url(#d-teal)"  stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="28,8 40,24 28,40" fill="none" stroke="url(#d-amber)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="24" r="2.8" fill="#a0b8cc" opacity="0.55"/>
        </svg>
      </div>
      <span>64 px dark</span>
    </div>

    <div class="icon-cell">
      <div class="bg-light" style="padding:12px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="32" height="32" role="img" aria-label="OpenClienting.org">
          <defs>
            <linearGradient id="e-teal" x1="20" y1="8" x2="20" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#5aaad4"/><stop offset="50%" stop-color="#2773a5"/><stop offset="100%" stop-color="#155f90"/>
            </linearGradient>
            <linearGradient id="e-amber" x1="28" y1="8" x2="28" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f0c860"/><stop offset="50%" stop-color="#d4924a"/><stop offset="100%" stop-color="#b06820"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="46" height="46" rx="10" fill="#dceef7"/>
          <polyline points="20,8 8,24 20,40"  fill="none" stroke="url(#e-teal)"  stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="28,8 40,24 28,40" fill="none" stroke="url(#e-amber)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>32 px</span>
    </div>

    <div class="icon-cell">
      <div class="bg-light" style="padding:10px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20" role="img" aria-label="OpenClienting.org">
          <defs>
            <linearGradient id="f-teal" x1="20" y1="8" x2="20" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#5aaad4"/><stop offset="100%" stop-color="#155f90"/>
            </linearGradient>
            <linearGradient id="f-amber" x1="28" y1="8" x2="28" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f0c860"/><stop offset="100%" stop-color="#b06820"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="46" height="46" rx="10" fill="#dceef7"/>
          <polyline points="20,8 8,24 20,40"  fill="none" stroke="url(#f-teal)"  stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="28,8 40,24 28,40" fill="none" stroke="url(#f-amber)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>20 px (favicon)</span>
    </div>

  </div>

  <br><br><hr><br>

  <!-- == COMPACT NAVBAR == -->
  <h2>Compact &mdash; navbar / no .org</h2>
  <div class="row">
    <div class="bg-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44" role="img" aria-label="OpenClienting">
        <defs>
          <linearGradient id="g-teal" x1="19" y1="9" x2="19" y2="35" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#5aaad4"/>
            <stop offset="50%"  stop-color="#2773a5"/>
            <stop offset="100%" stop-color="#155f90"/>
          </linearGradient>
          <linearGradient id="g-amber" x1="25" y1="9" x2="25" y2="35" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#f0c860"/>
            <stop offset="50%"  stop-color="#d4924a"/>
            <stop offset="100%" stop-color="#b06820"/>
          </linearGradient>
        </defs>
        <polyline points="19,9 8,22 19,35"  fill="none" stroke="url(#g-teal)"  stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="25,9 36,22 25,35" fill="none" stroke="url(#g-amber)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="22" r="2.5" fill="#2a3a4a" opacity="0.5"/>
        <text font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="21" font-weight="600" letter-spacing="-0.03em" y="29">
          <tspan x="52" fill="#2773a5">Open</tspan><tspan fill="#1b1c2d">Clienting</tspan>
        </text>
      </svg>
    </div>
    <div class="bg-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44" role="img" aria-label="OpenClienting">
        <defs>
          <linearGradient id="h-teal" x1="19" y1="9" x2="19" y2="35" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#80c8e8"/>
            <stop offset="50%"  stop-color="#5aa0cc"/>
            <stop offset="100%" stop-color="#2e78a8"/>
          </linearGradient>
          <linearGradient id="h-amber" x1="25" y1="9" x2="25" y2="35" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#f8d878"/>
            <stop offset="50%"  stop-color="#e0a85a"/>
            <stop offset="100%" stop-color="#b87030"/>
          </linearGradient>
        </defs>
        <polyline points="19,9 8,22 19,35"  fill="none" stroke="url(#h-teal)"  stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="25,9 36,22 25,35" fill="none" stroke="url(#h-amber)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="22" r="2.5" fill="#a0b8cc" opacity="0.5"/>
        <text font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="21" font-weight="600" letter-spacing="-0.03em" y="29">
          <tspan x="52" fill="#5aa0cc">Open</tspan><tspan fill="#eceae6">Clienting</tspan>
        </text>
      </svg>
    </div>
  </div>

</body>
</html>
